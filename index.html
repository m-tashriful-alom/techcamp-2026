<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intelligent &amp; Autonomous Vehicles — TechCamp 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>

/* ============ TOKENS ============ */
:root{
  --bg-0:#06090f;
  --bg-1:#0a0f1a;
  --bg-2:#0d1422;
  --panel:#0e1726;
  --line:#1b2840;
  --line-bright:#2a3f63;
  --cyan:#3fd6ff;
  --cyan-dim:#1f7a96;
  --amber:#ffb648;
  --violet:#7c8cff;
  --text-0:#eaf2ff;
  --text-1:#a9b8d2;
  --text-2:#6b7d9c;
  --mono:'JetBrains Mono','Roboto Mono',ui-monospace,Consolas,monospace;
  --sans:'Inter','Segoe UI',system-ui,-apple-system,sans-serif;
  --disp:'Space Grotesk','Inter',var(--sans);
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg-0);
  color:var(--text-0);
  font-family:var(--sans);
  overflow:hidden;
  height:100vh;
  width:100vw;
}

@font-face{font-family:'fallback-disp';src:local('Arial');}

/* subtle grid + scanline atmosphere on the whole app */
#app{
  position:relative;
  height:100vh;
  width:100vw;
  background-image:
    radial-gradient(circle at 18% 12%, rgba(63,214,255,0.07), transparent 45%),
    radial-gradient(circle at 85% 85%, rgba(124,140,255,0.06), transparent 45%),
    linear-gradient(var(--bg-0), var(--bg-0));
  background-size:cover;
}

#app::before{
  content:'';
  position:absolute; inset:0;
  background-image:
    linear-gradient(rgba(63,214,255,0.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(63,214,255,0.035) 1px, transparent 1px);
  background-size:42px 42px;
  pointer-events:none;
  z-index:0;
  mask-image:radial-gradient(ellipse 80% 70% at 50% 40%, black 30%, transparent 75%);
}

/* corner HUD ticks */
.hud-corner{
  position:fixed;
  width:22px;height:22px;
  border:2px solid var(--cyan-dim);
  opacity:.55;
  z-index:5;
  pointer-events:none;
}
.hud-corner.tl{top:18px;left:18px;border-right:none;border-bottom:none;}
.hud-corner.bl{bottom:64px;left:18px;border-right:none;border-top:none;}

/* ============ SLIDES VIEWPORT ============ */
#viewport{
  position:relative;
  height:100%;
  width:100%;
  z-index:1;
}

.slide{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:0 9vw;
  opacity:0;
  visibility:hidden;
  transform:translateX(40px);
  transition:opacity .5s cubic-bezier(.4,0,.2,1), transform .5s cubic-bezier(.4,0,.2,1);
}
.slide.active{
  opacity:1;
  visibility:visible;
  transform:translateX(0);
  z-index:2;
}
.slide.leaving-left{ transform:translateX(-40px); opacity:0; }

/* ---------- shared bits ---------- */
.eyebrow{
  font-family:var(--mono);
  font-size:13px;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:var(--cyan);
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:18px;
}
.eyebrow::before{
  content:'';
  width:7px;height:7px;
  border-radius:50%;
  background:var(--cyan);
  box-shadow:0 0 10px var(--cyan);
}
.eyebrow .sep{color:var(--text-2); opacity:.6;}

h1.headline{
  font-family:var(--disp);
  font-weight:700;
  font-size:clamp(34px,5vw,58px);
  line-height:1.05;
  letter-spacing:-.01em;
  margin:0 0 14px 0;
  color:var(--text-0);
}
h1.headline .accent{
  color:var(--cyan);
  background:linear-gradient(90deg,var(--cyan),var(--violet));
  -webkit-background-clip:text;
  background-clip:text;
  -webkit-text-fill-color:transparent;
}

.lede{
  font-size:clamp(15px,1.6vw,19px);
  color:var(--text-1);
  max-width:640px;
  line-height:1.55;
  margin:0;
}

.kicker-rule{
  width:64px;height:3px;
  background:linear-gradient(90deg,var(--cyan),var(--violet));
  margin-top:22px;border-radius:2px;
}

/* two column content layout used by most body slides */
.content-grid{
  display:grid;
  grid-template-columns:1.05fr 0.95fr;
  gap:5vw;
  align-items:center;
  width:100%;
  max-width:1280px;
  margin:0 auto;
}
.content-grid.reverse{ direction:rtl; }
.content-grid.reverse > *{ direction:ltr; }

.col-text h2{
  font-family:var(--disp);
  font-size:clamp(26px,3.2vw,38px);
  font-weight:700;
  margin:0 0 14px 0;
  color:var(--text-0);
}
.col-text .intro{
  color:var(--text-1);
  font-size:15px;
  line-height:1.6;
  margin-bottom:20px;
  max-width:480px;
}

.feature-list{ list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:14px; }
.feature-list li{
  display:flex;
  gap:12px;
  align-items:flex-start;
  font-size:14.5px;
  line-height:1.55;
  color:var(--text-1);
}
.feature-list li .bullet{
  flex:none;
  width:8px;height:8px;
  margin-top:6px;
  background:var(--cyan);
  box-shadow:0 0 8px rgba(63,214,255,.6);
  transform:rotate(45deg);
}
.feature-list li b{ color:var(--text-0); font-weight:600;}

/* image frame — fixed-ratio cover so any uploaded image fits cleanly */
.img-frame{
  position:relative;
  width:100%;
  aspect-ratio:4/3;
  border-radius:14px;
  overflow:hidden;
  background:linear-gradient(160deg,var(--panel),#0a0f1a);
  border:1px solid var(--line-bright);
  box-shadow:0 30px 60px -20px rgba(0,0,0,.6), 0 0 0 1px rgba(63,214,255,.05) inset;
}
.img-frame img{
  position:absolute; inset:0;
  width:100%; height:100%;
  object-fit:cover;
  object-position:center;
  display:block;
}
.img-frame .frame-corners span{
  position:absolute;
  width:18px;height:18px;
  border:2px solid var(--cyan);
  opacity:.85;
  z-index:3;
}
.img-frame .frame-corners span.c-tl{top:10px;left:10px;border-right:none;border-bottom:none;}
.img-frame .frame-corners span.c-tr{top:10px;right:10px;border-left:none;border-bottom:none;}
.img-frame .frame-corners span.c-bl{bottom:10px;left:10px;border-right:none;border-top:none;}
.img-frame .frame-corners span.c-br{bottom:10px;right:10px;border-left:none;border-top:none;}

.img-frame .placeholder-ph{
  position:absolute; inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:10px;
  z-index:2;
  background:
    repeating-linear-gradient(45deg, rgba(63,214,255,.035) 0 2px, transparent 2px 14px),
    radial-gradient(circle at 50% 40%, rgba(63,214,255,.08), transparent 60%);
}
.img-frame .placeholder-ph svg{ width:38px; height:38px; opacity:.45; }
.img-frame .placeholder-ph .ph-label{
  font-family:var(--mono);
  font-size:11px;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--text-2);
  text-align:center;
  padding:0 20px;
}
.img-frame .placeholder-ph .ph-file{
  font-family:var(--mono);
  font-size:10.5px;
  color:var(--cyan-dim);
  letter-spacing:.04em;
}
.img-frame .scan-line{
  position:absolute; left:0; right:0; height:1px;
  background:linear-gradient(90deg, transparent, var(--cyan), transparent);
  opacity:.5;
  animation:scanmove 3.4s linear infinite;
  z-index:2;
}
@keyframes scanmove{ 0%{top:6%;} 50%{top:92%;} 100%{top:6%;} }
.img-frame .corner-tag{
  position:absolute; bottom:12px; left:14px;
  font-family:var(--mono);
  font-size:10px;
  letter-spacing:.1em;
  color:var(--cyan);
  opacity:.8;
  z-index:3;
  background:rgba(6,9,15,.55);
  padding:3px 8px;
  border-radius:4px;
  backdrop-filter:blur(2px);
}
.hero-split .img-side .corner-tag{ bottom:78px; z-index:5; }

/* card grid (history / dynamics slides) */
.card-stack{ display:flex; flex-direction:column; gap:16px; }
.info-card{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:12px;
  padding:20px 22px;
  position:relative;
  overflow:hidden;
}
.info-card::before{
  content:'';
  position:absolute; left:0; top:0; bottom:0; width:3px;
  background:linear-gradient(180deg,var(--cyan),var(--violet));
  opacity:.0;
  transition:opacity .25s;
}
.info-card:hover::before{ opacity:1; }
.info-card .card-head{
  display:flex; align-items:center; gap:10px;
  font-family:var(--disp);
  font-weight:600;
  font-size:17px;
  color:var(--cyan);
  margin-bottom:8px;
}
.info-card .card-head .icon{ font-size:18px; line-height:1; }
.info-card p{
  margin:0;
  color:var(--text-1);
  font-size:14px;
  line-height:1.55;
}

.card-grid-2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  width:100%;
  max-width:1100px;
  margin:0 auto;
}

/* formula panel */
.formula-panel{
  background:var(--panel);
  border:1px solid var(--line-bright);
  border-radius:14px;
  padding:26px 28px;
  position:relative;
}
.formula-panel .fp-title{
  font-family:var(--mono);
  font-size:12px;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--cyan);
  margin-bottom:18px;
}
.formula-panel .fp-eq{
  font-family:var(--mono);
  font-size:clamp(16px,2vw,20px);
  color:var(--text-0);
  text-align:center;
  padding:18px 10px;
  background:rgba(63,214,255,.04);
  border:1px solid var(--line);
  border-radius:10px;
  margin-bottom:14px;
  overflow-x:auto;
  white-space:nowrap;
}
.formula-panel .fp-note{
  font-size:12.5px;
  color:var(--text-2);
  line-height:1.6;
}

/* full-bleed image hero (Maserati slide style) */
.hero-split{
  position:absolute; inset:0;
  display:grid;
  grid-template-columns:1fr 1fr;
}
.hero-split .text-side{
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:0 6vw;
  z-index:2;
}
.hero-split .img-side{
  position:relative;
  overflow:hidden;
}
.hero-split .img-side .image-side-stage{
  position:absolute; inset:0;
}
.hero-split .img-side .image-side-stage .img-frame{
  position:absolute; inset:0;
  width:100%; height:100%;
  aspect-ratio:unset;
}
.hero-split .img-side img{
  position:absolute; inset:0;
  width:100%; height:100%;
  object-fit:cover;
}
.hero-split .img-side::after{
  content:'';
  position:absolute; inset:0;
  background:linear-gradient(90deg, var(--bg-0) 0%, rgba(6,9,15,.25) 14%, transparent 38%);
  z-index:4;
  pointer-events:none;
}
.hero-split .img-side .placeholder-ph{ background:var(--bg-1); }

/* divider / section slides */
.divider-slide{
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  flex-direction:column;
  height:100%;
}
.divider-slide .part-no{
  font-family:var(--mono);
  font-size:14px;
  letter-spacing:.2em;
  color:var(--cyan);
  margin-bottom:20px;
}
.divider-slide h1{
  font-family:var(--disp);
  font-weight:700;
  font-size:clamp(36px,5.5vw,64px);
  margin:0;
  color:var(--text-0);
}
.divider-slide .kicker-rule{ margin:26px auto 0; }

/* title slide */
.title-slide .badge{
  display:inline-flex;
  align-items:center;
  gap:8px;
  font-family:var(--mono);
  font-size:12px;
  letter-spacing:.12em;
  color:var(--cyan);
  border:1px solid var(--cyan-dim);
  padding:7px 16px;
  border-radius:30px;
  margin-bottom:26px;
  width:fit-content;
  background:rgba(63,214,255,.05);
}
.title-slide .badge::before{
  content:'';
  width:6px;height:6px;border-radius:50%;
  background:var(--cyan);
  box-shadow:0 0 8px var(--cyan);
}
.title-footer{
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
  margin-top:64px;
  padding-top:24px;
  border-top:1px solid var(--line);
  max-width:900px;
}
.title-footer .group-tag{
  font-family:var(--disp);
  font-weight:700;
  font-size:18px;
  color:var(--text-0);
}
.title-footer .group-sub{
  font-family:var(--mono);
  font-size:11px;
  letter-spacing:.08em;
  color:var(--amber);
  margin-top:4px;
}
.title-footer .members{
  text-align:right;
  font-size:13px;
  color:var(--text-1);
  line-height:1.6;
}
.title-footer .members b{ color:var(--text-0); }

/* closing slide */
.closing-slide{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  height:100%;
  gap:18px;
}
.closing-slide h1{
  font-family:var(--disp);
  font-weight:700;
  font-size:clamp(46px,7vw,86px);
  margin:0;
  color:var(--text-0);
}
.closing-slide h1 .dot{ color:var(--cyan); }
.closing-slide .sub{
  font-size:18px;
  color:var(--text-1);
  font-family:var(--mono);
  letter-spacing:.04em;
}
.closing-slide .meta{
  margin-top:28px;
  font-size:13px;
  color:var(--text-2);
  line-height:1.7;
}
.closing-slide .meta b{ color:var(--cyan); }

/* ============ CHROME: progress / controls / fullscreen ============ */
#topbar{
  position:fixed;
  top:0; left:0; right:0;
  height:54px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 26px;
  z-index:50;
  pointer-events:none;
}
#topbar .brand{
  font-family:var(--mono);
  font-size:11.5px;
  letter-spacing:.12em;
  color:var(--text-2);
  display:flex;
  align-items:center;
  gap:8px;
  pointer-events:auto;
}
#topbar .brand .dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--cyan);
  box-shadow:0 0 8px var(--cyan);
}

#fullscreen-btn{
  pointer-events:auto;
  background:rgba(14,23,38,.8);
  border:1px solid var(--line-bright);
  color:var(--text-1);
  width:38px;height:38px;
  border-radius:9px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition:all .2s;
  backdrop-filter:blur(6px);
}
#fullscreen-btn:hover{
  border-color:var(--cyan);
  color:var(--cyan);
  box-shadow:0 0 16px rgba(63,214,255,.25);
}
#fullscreen-btn svg{ width:17px; height:17px; }

#bottombar{
  position:fixed;
  left:0; right:0; bottom:0;
  height:64px;
  display:flex;
  align-items:center;
  gap:18px;
  padding:0 26px;
  z-index:50;
  background:linear-gradient(180deg, transparent, rgba(6,9,15,.55) 40%);
}

.nav-btn{
  flex:none;
  width:40px;height:40px;
  border-radius:50%;
  border:1px solid var(--line-bright);
  background:rgba(14,23,38,.85);
  color:var(--text-1);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition:all .2s;
  backdrop-filter:blur(6px);
}
.nav-btn:hover:not(:disabled){
  border-color:var(--cyan);
  color:var(--cyan);
  box-shadow:0 0 16px rgba(63,214,255,.25);
  transform:translateY(-1px);
}
.nav-btn:disabled{ opacity:.3; cursor:not-allowed; }
.nav-btn svg{ width:18px; height:18px; }

#progress-track{
  position:relative;
  flex:1;
  height:4px;
  background:var(--line);
  border-radius:4px;
  overflow:hidden;
  cursor:pointer;
}
#progress-fill{
  position:absolute; left:0; top:0; bottom:0;
  width:0%;
  background:linear-gradient(90deg,var(--cyan),var(--violet));
  border-radius:4px;
  transition:width .4s cubic-bezier(.4,0,.2,1);
  box-shadow:0 0 10px rgba(63,214,255,.5);
}
#progress-track .tick{
  position:absolute;
  top:0; bottom:0;
  width:1px;
  background:rgba(6,9,15,.5);
  z-index:2;
}

#slide-counter{
  flex:none;
  font-family:var(--mono);
  font-size:12.5px;
  color:var(--text-1);
  letter-spacing:.04em;
  min-width:72px;
  text-align:right;
}
#slide-counter .cur{ color:var(--cyan); font-weight:600; }
#slide-counter .tot{ color:var(--text-2); }

/* keyboard hint, fades after a moment */
#kbd-hint{
  position:fixed;
  bottom:78px; right:26px;
  font-family:var(--mono);
  font-size:11px;
  color:var(--text-2);
  background:rgba(14,23,38,.85);
  border:1px solid var(--line);
  padding:7px 12px;
  border-radius:8px;
  z-index:49;
  transition:opacity 1s;
  pointer-events:none;
}
#kbd-hint.hide{ opacity:0; }

/* fullscreen mode tweaks */
#app:fullscreen{ background:var(--bg-0); }
#app:-webkit-full-screen{ background:var(--bg-0); }

/* responsive */
/* desktop-only deck: no mobile breakpoint */
</style>
</head>
<body>

<div id="app">
  <div class="hud-corner tl"></div>
  <div class="hud-corner bl"></div>

  <div id="topbar">
    <div class="brand"><span class="dot"></span> POLIMI · TECHCAMP 2026</div>
    <button id="fullscreen-btn" title="Toggle fullscreen presentation">
      <svg id="fs-icon-expand" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3M16 3h3a2 2 0 0 1 2 2v3M21 16v3a2 2 0 0 1-2 2h-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
      <svg id="fs-icon-collapse" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M9 3v3a2 2 0 0 1-2 2H4M21 8h-3a2 2 0 0 1-2-2V3M3 16h3a2 2 0 0 1 2 2v3M16 21v-3a2 2 0 0 1 2-2h3"/></svg>
    </button>
  </div>

  <div id="viewport"><!-- slides injected by JS-free static markup below --></div>

  <div id="kbd-hint">← → or space to navigate · F for fullscreen</div>

  <div id="bottombar">
    <button class="nav-btn" id="prev-btn" title="Previous slide">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <div id="progress-track">
      <div id="progress-fill"></div>
    </div>
    <div id="slide-counter"><span class="cur">01</span><span class="tot"> / 12</span></div>
    <button class="nav-btn" id="next-btn" title="Next slide">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
    </button>
  </div>
</div>

<script>
/* ============================================================
   IMAGE PLACEHOLDER COMPONENT
   Each .img-frame looks for an <img> with the given filename
   inside /images/. If it loads successfully, it's shown
   (cropped to cover via object-fit). If it fails (file not
   yet uploaded), the placeholder graphic stays visible.
   ============================================================ */
function placeholderSVG(){
  return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>';
}

function initImageFrames(){
  document.querySelectorAll('.img-frame[data-img]').forEach(function(frame){
    var filename = frame.getAttribute('data-img');
    var label = frame.getAttribute('data-label') || '';
    var img = document.createElement('img');
    img.alt = label;
    img.loading = 'lazy';

    var ph = document.createElement('div');
    ph.className = 'placeholder-ph';
    ph.innerHTML =
      placeholderSVG() +
      '<div class="ph-label">' + label + '</div>' +
      '<div class="ph-file">images/' + filename + '</div>';

    var scan = document.createElement('div');
    scan.className = 'scan-line';

    img.onload = function(){
      ph.style.display = 'none';
      scan.style.display = 'none';
    };
    img.onerror = function(){
      img.style.display = 'none';
    };
    img.src = 'images/' + filename;

    frame.prepend(scan);
    frame.prepend(ph);
    frame.prepend(img);
  });
}

/* ============================================================
   SLIDE DECK ENGINE
   ============================================================ */
(function(){
  var slides, total, current = 0;
  var viewport = document.getElementById('viewport');

  function buildSlides(html){
    viewport.innerHTML = html;
    slides = Array.prototype.slice.call(viewport.querySelectorAll('.slide'));
    total = slides.length;
    document.querySelector('#slide-counter .tot').textContent = ' / ' + String(total).padStart(2,'0');
    renderTicks();
    goTo(0, true);
  }

  function renderTicks(){
    var track = document.getElementById('progress-track');
    // remove old ticks
    track.querySelectorAll('.tick').forEach(function(t){ t.remove(); });
    for(var i=1;i<total;i++){
      var tick = document.createElement('div');
      tick.className = 'tick';
      tick.style.left = (i/total*100) + '%';
      track.appendChild(tick);
    }
  }

  function goTo(idx, instant){
    idx = Math.max(0, Math.min(total-1, idx));
    var prev = current;
    slides.forEach(function(s, i){
      s.classList.remove('active','leaving-left');
      if(i === idx){
        s.classList.add('active');
      } else if (i === prev && prev !== idx){
        s.classList.add('leaving-left');
      }
    });
    current = idx;
    document.querySelector('#slide-counter .cur').textContent = String(idx+1).padStart(2,'0');
    document.getElementById('progress-fill').style.width = ((idx+1)/total*100) + '%';
    document.getElementById('prev-btn').disabled = idx === 0;
    document.getElementById('next-btn').disabled = idx === total-1;
  }

  function next(){ if(current < total-1) goTo(current+1); }
  function prevSlide(){ if(current > 0) goTo(current-1); }

  document.getElementById('next-btn').addEventListener('click', next);
  document.getElementById('prev-btn').addEventListener('click', prevSlide);

  document.getElementById('progress-track').addEventListener('click', function(e){
    var rect = this.getBoundingClientRect();
    var pct = (e.clientX - rect.left) / rect.width;
    goTo(Math.round(pct * (total-1)));
  });

  document.addEventListener('keydown', function(e){
    if(e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown'){ e.preventDefault(); next(); }
    else if(e.key === 'ArrowLeft' || e.key === 'PageUp'){ e.preventDefault(); prevSlide(); }
    else if(e.key === 'f' || e.key === 'F'){ toggleFullscreen(); }
    else if(e.key === 'Home'){ goTo(0); }
    else if(e.key === 'End'){ goTo(total-1); }
  });

  /* fullscreen */
  var appEl = document.getElementById('app');
  var fsBtn = document.getElementById('fullscreen-btn');
  var iconExpand = document.getElementById('fs-icon-expand');
  var iconCollapse = document.getElementById('fs-icon-collapse');

  function toggleFullscreen(){
    if(!document.fullscreenElement){
      (appEl.requestFullscreen || appEl.webkitRequestFullscreen || appEl.msRequestFullscreen).call(appEl);
    } else {
      (document.exitFullscreen || document.webkitExitFullscreen || document.msExitFullscreen).call(document);
    }
  }
  fsBtn.addEventListener('click', toggleFullscreen);
  document.addEventListener('fullscreenchange', function(){
    var isFs = !!document.fullscreenElement;
    iconExpand.style.display = isFs ? 'none' : 'block';
    iconCollapse.style.display = isFs ? 'block' : 'none';
  });

  // kbd hint fade
  setTimeout(function(){
    document.getElementById('kbd-hint').classList.add('hide');
  }, 4500);

  window.__deck = { buildSlides: buildSlides, goTo: goTo };
})();
</script>
